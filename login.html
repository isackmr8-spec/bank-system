<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRDB Bank</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🏦 CRDB Bank</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2>Secure Login</h2>
        <p style="text-align: center; margin-bottom: 20px; opacity: 0.8;">Access your banking services</p>
        
<form id="loginForm">
            <div class="input-group">
                <input type="text" id="loginUsername" name="username" placeholder="Username or Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn">Login Securely</button>
        </form>

        <div class="success-msg"></div>
        <div class="error-msg"></div>

        <div class="links">
            <a href="register.html">Don't have an account? Register</a> | 
            <a href="admin.html">Admin Login</a>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
</body>
</html>
